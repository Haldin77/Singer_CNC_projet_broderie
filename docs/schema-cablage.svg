<svg viewBox="0 0 1180 960" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Schéma électrique brodeuse CNC Singer — portique Y à deux moteurs</title>
<desc>Deux alimentations 48V et 24V, ESP32 sur USB, 74HCT245, quatre drivers dont deux DM320S en parallèle sur le rail Y à deux Nema 17, capteurs sur pins à pull-up interne.</desc>
<rect width="1180" height="960" fill="#ffffff"/>
<style>
  .lbl {fill:#1a1a1a;font-size:14px;}
  .lblb{fill:#1a1a1a;font-size:14px;font-weight:700;}
  .sub {fill:#666;font-size:11.5px;}
  .tiny{fill:#777;font-size:10.5px;}
  .pin {fill:#1a1a1a;font-size:11px;font-family:ui-monospace,monospace;}
  .box {fill:#f4f4f2;stroke:#d0d0cc;stroke-width:1.5;}
  .sig {stroke:#d97706;stroke-width:2;fill:none;}
  .p48 {stroke:#dc2626;stroke-width:2.5;fill:none;}
  .p24 {stroke:#ea580c;stroke-width:2.5;fill:none;}
  .p5  {stroke:#16a34a;stroke-width:2;fill:none;}
  .gnd {stroke:#334155;stroke-width:2;fill:none;}
  .inp {stroke:#2563eb;stroke-width:2;fill:none;}
</style>

<text x="24" y="34" class="lblb" font-size="19">Brodeuse CNC Singer — schéma électrique · portique Y à 2 moteurs</text>

<g transform="translate(24,52)">
  <line x1="0" y1="8" x2="26" y2="8" class="p48"/><text x="32" y="12" class="tiny">48 V</text>
  <line x1="88" y1="8" x2="114" y2="8" class="p24"/><text x="120" y="12" class="tiny">24 V</text>
  <line x1="172" y1="8" x2="198" y2="8" class="p5"/><text x="204" y="12" class="tiny">5 V</text>
  <line x1="246" y1="8" x2="272" y2="8" class="sig"/><text x="278" y="12" class="tiny">signaux</text>
  <line x1="350" y1="8" x2="376" y2="8" class="inp"/><text x="382" y="12" class="tiny">capteurs</text>
  <line x1="458" y1="8" x2="484" y2="8" class="gnd"/><text x="490" y="12" class="tiny">masse commune</text>
</g>

<rect x="24" y="92" width="166" height="48" class="box" fill="#fef2f2" stroke="#dc2626" rx="8"/>
<text x="107" y="112" class="lblb" text-anchor="middle">Mean Well 48 V</text>
<text x="107" y="128" class="sub" text-anchor="middle">LRS-350-48 → Z</text>
<rect x="24" y="152" width="166" height="48" class="box" fill="#fff7ed" stroke="#ea580c" rx="8"/>
<text x="107" y="172" class="lblb" text-anchor="middle">Mean Well 24 V</text>
<text x="107" y="188" class="sub" text-anchor="middle">LRS-150-24 → X + Y1 + Y2</text>
<rect x="24" y="212" width="166" height="48" class="box" fill="#f0fdf4" stroke="#16a34a" rx="8"/>
<text x="107" y="232" class="lblb" text-anchor="middle">USB-C 5 V</text>
<text x="107" y="248" class="sub" text-anchor="middle">ESP32 + 74HCT245</text>

<rect x="238" y="148" width="200" height="322" class="box" fill="#eef2ff" stroke="#4f46e5" rx="10"/>
<text x="338" y="173" class="lblb" text-anchor="middle" font-size="15">ESP32-WROOM-32</text>
<line x1="252" y1="184" x2="424" y2="184" stroke="#c7c7c7"/>
<text x="252" y="201" class="tiny" font-weight="700">Sorties → 74HCT245</text>
<text x="252" y="219" class="pin">GPIO26  X step  → A1</text>
<text x="252" y="235" class="pin">GPIO16  X dir   → A2</text>
<text x="252" y="251" class="pin">GPIO25  Y step  → A3</text>
<text x="252" y="267" class="pin">GPIO27  Y dir   → A4</text>
<text x="252" y="283" class="pin">GPIO17  Z step  → A5</text>
<text x="252" y="299" class="pin">GPIO14  Z dir   → A6</text>
<text x="252" y="315" class="pin">GPIO13  ENABLE  → A7+A8</text>
<line x1="252" y1="330" x2="424" y2="330" stroke="#c7c7c7"/>
<text x="252" y="348" class="tiny" font-weight="700">Entrées (pull-up interne)</text>
<text x="252" y="366" class="pin">GPIO4   fin course X</text>
<text x="252" y="382" class="pin">GPIO21  fin course Y</text>
<text x="252" y="398" class="pin">GPIO22  Hall index Z</text>
<text x="252" y="414" class="pin">GPIO32  casse-fil</text>
<text x="252" y="430" class="pin">GPIO33  arret urgence</text>
<text x="252" y="452" class="tiny">2 fils/capteur, aucune resistance</text>
<circle cx="426" cy="215" r="3" fill="#d97706"/>
<circle cx="426" cy="311" r="3" fill="#d97706"/>
<circle cx="250" cy="362" r="3" fill="#2563eb"/>
<path d="M190 236 H212 V300 H236" class="p5"/>

<rect x="492" y="188" width="150" height="150" class="box" fill="#fffbeb" stroke="#d97706" rx="10"/>
<text x="567" y="212" class="lblb" text-anchor="middle">74HCT245</text>
<text x="567" y="229" class="sub" text-anchor="middle">3,3 V → 5 V</text>
<text x="506" y="252" class="pin">B1 B2  → X</text>
<text x="506" y="268" class="pin">B3 B4  → Y1 + Y2</text>
<text x="506" y="284" class="pin">B5 B6  → Z</text>
<text x="506" y="300" class="pin">B7 → ENA X,Z</text>
<text x="506" y="316" class="pin">B8 → ENA Y1,Y2</text>
<text x="506" y="332" class="pin">pin1→5V pin19→GND</text>
<path d="M426 215 H462 V252 H492" class="sig"/>
<path d="M426 311 H452 V268 H492" class="sig"/>
<path d="M190 236 H212 V150 H567 V188" class="p5"/>

<rect x="708" y="88" width="150" height="66" class="box" fill="#fef2f2" stroke="#dc2626" rx="8"/>
<text x="783" y="110" class="lblb" text-anchor="middle">DM542 · Z</text>
<text x="783" y="127" class="sub" text-anchor="middle">1/4 pas · 4,2 A · 48 V</text>
<text x="720" y="145" class="pin">◄B5 B6 B7 · 48V+ · GND</text>
<rect x="708" y="166" width="150" height="60" class="box" fill="#fff7ed" stroke="#ea580c" rx="8"/>
<text x="783" y="187" class="lblb" text-anchor="middle">DM320S · X</text>
<text x="720" y="206" class="pin">◄B1 B2 B7 · 24V+</text>
<text x="720" y="220" class="pin">GND</text>
<rect x="708" y="238" width="150" height="60" class="box" fill="#fff7ed" stroke="#ea580c" rx="8"/>
<text x="783" y="259" class="lblb" text-anchor="middle">DM320S · Y1</text>
<text x="720" y="278" class="pin">◄B3 B4 B8 · 24V+</text>
<text x="720" y="292" class="pin">GND</text>
<rect x="708" y="310" width="150" height="60" class="box" fill="#fff7ed" stroke="#ea580c" rx="8"/>
<text x="783" y="331" class="lblb" text-anchor="middle">DM320S · Y2</text>
<text x="720" y="350" class="pin">◄B3 B4 B8 · 24V+</text>
<text x="720" y="364" class="pin">GND (parallele Y1)</text>

<path d="M642 258 H672 V121 H708" class="sig"/>
<path d="M642 270 H666 V196 H708" class="sig"/>
<path d="M642 282 H660 V268 H708" class="sig"/>
<path d="M660 268 V340 H708" class="sig"/>
<circle cx="660" cy="268" r="3" fill="#d97706"/>
<path d="M190 104 H694 V121 H708" class="p48"/>
<text x="676" y="118" class="tiny" fill="#dc2626">48V</text>
<path d="M190 164 H540 V196 H708" class="p24"/>
<path d="M540 196 V268 H708" class="p24"/>
<path d="M540 268 V340 H708" class="p24"/>
<circle cx="540" cy="196" r="3" fill="#ea580c"/>
<circle cx="540" cy="268" r="3" fill="#ea580c"/>

<circle cx="945" cy="121" r="30" class="box" fill="#f1f5f9" stroke="#475569"/>
<text x="945" y="126" class="lblb" text-anchor="middle">N23</text>
<text x="945" y="162" class="sub" text-anchor="middle">Z · 3 N·m</text>
<path d="M858 121 H915" class="gnd" stroke="#475569"/>
<circle cx="945" cy="196" r="26" class="box" fill="#f1f5f9" stroke="#475569"/>
<text x="945" y="201" class="lblb" text-anchor="middle">N17</text>
<text x="1000" y="200" class="sub">X</text>
<path d="M858 196 H919" class="gnd" stroke="#475569"/>
<circle cx="945" cy="268" r="26" class="box" fill="#f1f5f9" stroke="#475569"/>
<text x="945" y="273" class="lblb" text-anchor="middle">N17</text>
<text x="1000" y="272" class="sub">Y gauche</text>
<path d="M858 268 H919" class="gnd" stroke="#475569"/>
<circle cx="945" cy="340" r="26" class="box" fill="#f1f5f9" stroke="#475569"/>
<text x="945" y="345" class="lblb" text-anchor="middle">N17</text>
<text x="1000" y="344" class="sub">Y droite</text>
<path d="M858 340 H919" class="gnd" stroke="#475569"/>

<rect x="24" y="520" width="418" height="140" class="box" fill="#eff6ff" stroke="#2563eb" rx="10"/>
<text x="233" y="544" class="lblb" text-anchor="middle">Capteurs — 2 fils, pull-up interne</text>
<line x1="40" y1="554" x2="426" y2="554" stroke="#bcd0f0"/>
<rect x="40" y="568" width="116" height="38" rx="6" fill="#fff" stroke="#93b4e6"/>
<text x="98" y="584" class="lbl" text-anchor="middle" font-size="12">Hall KY-003</text>
<text x="98" y="598" class="sub" text-anchor="middle">GPIO22</text>
<rect x="164" y="568" width="126" height="38" rx="6" fill="#fff" stroke="#93b4e6"/>
<text x="227" y="584" class="lbl" text-anchor="middle" font-size="12">Fins course X/Y</text>
<text x="227" y="598" class="sub" text-anchor="middle">GPIO4 / 21</text>
<rect x="298" y="568" width="128" height="38" rx="6" fill="#fff" stroke="#93b4e6"/>
<text x="362" y="584" class="lbl" text-anchor="middle" font-size="12">Casse-fil · Urgence</text>
<text x="362" y="598" class="sub" text-anchor="middle">GPIO32 / 33</text>
<text x="40" y="628" class="tiny">Repos = 1, declenche = 0. GPIO 34-39 proscrits (flottent, valide Wokwi).</text>
<text x="40" y="646" class="tiny">Un seul capteur de fin de course Y suffit (les 2 moteurs bougent ensemble).</text>
<path d="M227 520 V488 H250 V362" class="inp"/>

<text x="470" y="700" class="lblb">Barre de masse commune</text>
<line x1="470" y1="712" x2="1140" y2="712" class="gnd" stroke-width="3"/>
<path d="M107 260 V688 H470" class="gnd" opacity="0.5"/>
<line x1="540" y1="712" x2="540" y2="724" class="gnd"/>
<line x1="680" y1="712" x2="680" y2="724" class="gnd"/>
<line x1="820" y1="712" x2="820" y2="724" class="gnd"/>
<line x1="980" y1="712" x2="980" y2="724" class="gnd"/>
<line x1="1095" y1="712" x2="1095" y2="724" class="gnd"/>
<text x="540" y="738" class="tiny" text-anchor="middle">48V −</text>
<text x="680" y="738" class="tiny" text-anchor="middle">24V −</text>
<text x="820" y="738" class="tiny" text-anchor="middle">245 pin10+OE</text>
<text x="980" y="738" class="tiny" text-anchor="middle">4× PUL−/DIR−/ENA−</text>
<text x="1095" y="738" class="tiny" text-anchor="middle">ESP32 GND</text>

<rect x="24" y="772" width="1132" height="158" rx="10" fill="#f4f4f2" stroke="#d97706" stroke-width="1.5"/>
<text x="40" y="796" class="lblb" fill="#b45309">Points de controle</text>
<text x="40" y="818" class="lbl" font-size="13">1.  Portique Y : les 2 drivers DM320S (Y1, Y2) recoivent les MEMES signaux Y step/dir/ena, cables en parallele. Les 2 moteurs bougent ensemble.</text>
<text x="40" y="840" class="lbl" font-size="13">2.  Verifier le SENS des 2 moteurs Y : ils doivent pousser le portique dans le meme sens. Si l'un part a l'envers, permuter une paire de fils de CE moteur.</text>
<text x="40" y="862" class="lbl" font-size="13">3.  ENABLE reparti sur 2 canaux du 245 (B7 = X,Z ; B8 = Y1,Y2) : 4 drivers depassent les 35 mA d'un seul canal. Les 2 canaux viennent du meme GPIO 13.</text>
<text x="40" y="884" class="lbl" font-size="13">4.  48 V uniquement sur le DM542. 24 V sur les 3 DM320S (jamais plus de 30 V). Toutes les masses reliees a la barre commune.</text>
<text x="40" y="906" class="lbl" font-size="13">5.  Budget puissance 24 V : Nema 23 ~32 W + 3x Nema 17 ~29 W = ~61 W, soit 2,5 A. L'alim 150 W (6,5 A) garde 61 % de marge.</text>
</svg>
